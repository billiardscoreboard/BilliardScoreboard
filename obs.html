<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Billiard OBS Overlay</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <style>
    /* Sfondo trasparente fondamentale per OBS */
    body { 
      margin: 0; padding: 0; 
      background: transparent !important; 
      color: white; font-family: 'Roboto', sans-serif;
      display: flex; justify-content: center; align-items: flex-start;
      height: 100vh; overflow: hidden;
    }
    
    .scoreboard {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0, 0, 0, 0.85); /* Sfondo semi-trasparente elegante */
      border: 3px solid #444; border-top: none;
      border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
      padding: 10px 40px; width: 1200px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .player { display: flex; align-items: center; gap: 20px; width: 45%; }
    .player-2 { flex-direction: row-reverse; }

    .name { font-size: 36px; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
    .player-2 .name { color: #facc15; }

    .set { 
      background: white; color: black; font-size: 32px; font-weight: bold; 
      width: 50px; height: 50px; border-radius: 50%; 
      display: flex; justify-content: center; align-items: center;
    }
    .player-2 .set { background: #facc15; }

    .score { font-size: 80px; font-weight: 900; min-width: 120px; text-align: center; }
    .player-2 .score { color: #facc15; }

    .vs { font-size: 30px; font-weight: bold; color: #888; margin: 0 20px; }
  </style>
</head>
<body>

  <div class="scoreboard">
    <div class="player player-1">
      <div class="name" id="obs-n0">GIOCATORE 1</div>
      <div class="set" id="obs-st0">0</div>
      <div class="score" id="obs-s0">0</div>
    </div>
    
    <div class="vs">VS</div>
    
    <div class="player player-2">
      <div class="name" id="obs-n1">GIOCATORE 2</div>
      <div class="set" id="obs-st1">0</div>
      <div class="score" id="obs-s1">0</div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk",
      authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com",
      databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "billiard-scoreboard-3cbb5",
      appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Recupera l'ID della partita dall'URL (es: obs.html?id=BS-1234)
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    if (matchId) {
        db.ref('matches/' + matchId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('obs-n0').innerText = data.n0 || "GIOCATORE 1";
                document.getElementById('obs-n1').innerText = data.n1 || "GIOCATORE 2";
                document.getElementById('obs-s0').innerText = data.s0 || "0";
                document.getElementById('obs-s1').innerText = data.s1 || "0";
                document.getElementById('obs-st0').innerText = data.st0 || "0";
                document.getElementById('obs-st1').innerText = data.st1 || "0";
            }
        });
    } else {
        document.getElementById('obs-n0').innerText = "IN ATTESA...";
        document.getElementById('obs-n1').innerText = "DI CONNESSIONE";
    }
  </script>
</body>
</html>
