<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Billiard Scoreboard - OBS Overlay No VS</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 20px;
    }

    /* CONTENITORE PRINCIPALE (Ora trasparente, mantiene solo l'allineamento) */
    .scoreboard-container {
      display: flex;
      align-items: center;
      gap: 40px; 
    }

    /* CONTENITORI GIOCATORI INDIPENDENTI (+20% Dimensioni) */
    .player-box {
      margin-top: 140px;
      display: flex;
      align-items: center;
      gap: 18px; /* +20% da 15px */
      min-width: 552px; /* +20% da 460px */
      
      /* Grafica (+20% bordi, raggi e padding) */
      background: #071f14; 
      border: 4px solid #000; /* Arrotondato da 3.6px per rendering */
      border-radius: 12px; /* +20% da 10px */
      padding: 12px 36px; /* +20% da 10px 30px */
      color: white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .player-icon {
      height: 60px; /* +20% da 50px */
      width: auto;
      flex-shrink: 0; 
    }

    .name {
      font-size: 40.32px; /* +20% da 33.6px */
      text-transform: capitalize;
      flex: 1; /* Occupa lo spazio centrale */
      text-align: center; /* Centra il testo nel suo spazio */
      white-space: nowrap; /* Impedisce al nome di andare a capo per forzare l'allargamento della casella */
    }

    /* PUNTEGGI (+20% Dimensioni e Font) */
    .score {
      font-size: 54px; /* +20% da 45px */
      color: #fff;
      background: #164d34; 
      padding: 0 18px; /* +20% da 15px */
      border-radius: 6px; /* +20% da 5px */
      min-width: 72px; /* +20% da 60px */
      text-align: center;
      flex-shrink: 0;
    }

    /* SET (+20% Dimensioni e Font) */
    .sets {
      font-size: 45.9px; /* +20% da 38.25px */
      background: #fff; 
      color: #000;
      width: 53.04px; /* +20% da 44.2px */
      height: 53.04px; /* +20% da 44.2px */
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* LOGO CENTRALE INDIPENDENTE (Invariato) */
    .center-logo {
      height: 160px; 
      width: auto;
      flex-shrink: 0;
      margin-bottom: 40px;
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
    }

    /* COLORI SPECIFICI P2 */
    .p2-name { color: #facc15; }
    .p2-score { color: #facc15 !important; }
    .p2-sets { background: #facc15 !important; }

  </style>
</head>
<body>

  <div class="scoreboard-container">
    
    <div class="player-box" id="p1-box">
      <img src="Logo_Giocatore_Bianco.svg" class="player-icon" alt="P1 Icon">
      <div id="name0" class="name">giocatore 1</div>
      <div id="st0" class="sets">0</div>
      <div id="score0" class="score">0</div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0;">
      <img src="https://billiardscoreboard.github.io/BilliardScoreboard/solo_logo_trasparente.svg" class="center-logo" alt="App Logo" style="margin-bottom: 10px;margin-top: 160px;">
      <img src="https://billiardscoreboard.github.io/BilliardScoreboard/solo_scritta_verde.svg" alt="App Testo" style="height: 120px; width: auto; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); margin-bottom: 70px; margin-top: -40px;">
    </div>

    <div class="player-box" id="p2-box">
      <div id="score1" class="score p2-score">0</div>
      <div id="st1" class="sets p2-sets">0</div>
      <div id="name1" class="name p2-name">giocatore 2</div>
      <img src="Logo_Giocatore_Giallo.svg" class="player-icon" alt="P2 Icon">
    </div>

  </div>

<script>
  // CONFIGURAZIONE FIREBASE (Invariata)
  const firebaseConfig = {
    apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk",
    authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com",
    databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "billiard-scoreboard-3cbb5",
    appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const urlParams = new URLSearchParams(window.location.search);
  const matchId = urlParams.get('id');

  if (matchId) {
    const matchRef = db.ref('matches/' + matchId);
    matchRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        document.getElementById('name0').innerText = (data.n0 || "Giocatore 1").toLowerCase();
        document.getElementById('name1').innerText = (data.n1 || "Giocatore 2").toLowerCase();
        document.getElementById('score0').innerText = data.s0 || 0;
        document.getElementById('score1').innerText = data.s1 || 0;
        document.getElementById('st0').innerText = data.st0 || 0;
        document.getElementById('st1').innerText = data.st1 || 0;
      }
    });
  } else {
    document.body.innerHTML = "<div style='color:white; background:red; padding:20px;'>ERRORE: ID TAVOLO MANCANTE</div>";
  }
</script>
</body>
</html>
