<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Billiard Scoreboard - OBS Overlay</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: transparent; /* Sfondo trasparente per OBS */
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 20px;
    }

    /* BARRA PRINCIPALE DEL PUNTEGGIO */
    .scoreboard-container {
      display: flex;
      align-items: center;
      background: rgba(7, 31, 20, 0.95); /* Colore scuro come index.html */
      border: 3px solid #000;
      border-radius: 10px;
      padding: 10px 20px;
      color: white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .player-box {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* ICONE GIOCATORI */
    .player-icon {
      height: 50px; /* Adattate alla barra */
      width: auto;
    }

    .name {
      font-size: 28px;
      text-transform: uppercase;
      min-width: 150px;
    }

    .score {
      font-size: 45px;
      color: #fff;
      background: #0b2b1c;
      padding: 0 15px;
      border-radius: 5px;
      min-width: 60px;
      text-align: center;
    }

    .sets {
      font-size: 24px;
      background: #fff;
      color: #000;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: bold;
    }

    /* DIVISORE CENTRALE */
    .divider {
      width: 40px;
      text-align: center;
      font-size: 20px;
      color: #555;
    }

    /* COLORI SPECIFICI P2 (GIALLO) */
    .p2-name { color: #facc15; }
    .p2-score { color: #facc15 !important; }
    .p2-sets { background: #facc15 !important; }

  </style>
</head>
<body>

  <div class="scoreboard-container">
    <div class="player-box">
      <img src="Logo_Giocatore_Bianco.svg" class="player-icon" alt="P1 Icon">
      <div id="name0" class="name">GIOCATORE 1</div>
      <div id="st0" class="sets">0</div>
      <div id="score0" class="score">0</div>
    </div>

    <div class="divider">VS</div>

    <div class="player-box">
      <div id="score1" class="score p2-score">0</div>
      <div id="st1" class="sets p2-sets">0</div>
      <div id="name1" class="name p2-name" style="text-align: right;">GIOCATORE 2</div>
      <img src="Logo_Giocatore_Giallo.svg" class="player-icon" alt="P2 Icon">
    </div>
  </div>

<script>
  // Configurazione Firebase (Stessa del tuo file index.html)
  const firebaseConfig = {
    apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk",
    authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com",
    databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "billiard-scoreboard-3cbb5",
    appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Recupera l'ID del tavolo dall'URL (?id=TAVOLO-XXXX)
  const urlParams = new URLSearchParams(window.location.search);
  const matchId = urlParams.get('id');

  if (matchId) {
    const matchRef = db.ref('matches/' + matchId);
    matchRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        document.getElementById('name0').innerText = data.n0 || "GIOCATORE 1";
        document.getElementById('name1').innerText = data.n1 || "GIOCATORE 2";
        document.getElementById('score0').innerText = data.s0 || 0;
        document.getElementById('score1').innerText = data.s1 || 0;
        document.getElementById('st0').innerText = data.st0 || 0;
        document.getElementById('st1').innerText = data.st1 || 0;
      }
    });
  } else {
    document.body.innerHTML = "<div style='color:white; background:red; padding:20px;'>ERRORE: ID TAVOLO MANCANTE NELL'URL</div>";
  }
</script>
</body>
</html>
