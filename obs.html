<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>OBS Scoreboard Overlay - Pro Stream</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    /* Sfondo trasparente per OBS */
    body { 
      margin: 0; 
      padding: 20px; 
      overflow: hidden; 
      background-color: transparent; 
      font-family: 'Rajdhani', sans-serif;
    }

    /* Contenitore Principale */
    .scoreboard-container {
      display: flex;
      align-items: center;
      background: rgba(7, 31, 20, 0.85);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 0;
      width: fit-content;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      overflow: hidden;
      height: 70px;
    }

    /* Sezione Giocatore */
    .player-box {
      display: flex;
      align-items: center;
      padding: 0 25px;
      height: 100%;
    }

    .player-name {
      font-size: 28px;
      font-weight: 700;
      text-transform: uppercase;
      color: white;
      letter-spacing: 1px;
      min-width: 150px;
    }

    /* Punteggio */
    .score-box {
      background: rgba(255, 255, 255, 0.05);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      min-width: 60px;
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .score-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 38px;
      font-weight: 700;
      color: #2ecc71;
      text-shadow: 0 0 15px rgba(46, 204, 113, 0.6);
      transition: all 0.3s ease;
    }

    /* Colore speciale per il secondo giocatore */
    .p2-color { color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.6); }

    /* Indicatori Set */
    .sets-container {
      display: flex;
      gap: 6px;
      padding: 0 15px;
    }

    .set-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .set-dot.active-p1 { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; border: none; }
    .set-dot.active-p2 { background: #f1c40f; box-shadow: 0 0 10px #f1c40f; border: none; }

    /* Separatore Centrale */
    .divider {
      width: 2px;
      height: 40px;
      background: rgba(255, 255, 255, 0.2);
    }

    /* Animazione quando il punteggio cambia */
    .score-update { transform: scale(1.2); }
  </style>
</head>
<body>

  <div class="scoreboard-container">
    <div class="player-box">
      <div class="player-name" id="name0">GIOCATORE 1</div>
      <div class="sets-container" id="sets0">
        </div>
    </div>
    
    <div class="score-box">
      <div class="score-val" id="score0">0</div>
    </div>

    <div class="divider"></div>

    <div class="score-box">
      <div class="score-val p2-color" id="score1">0</div>
    </div>

    <div class="player-box">
      <div class="sets-container" id="sets1">
        </div>
      <div class="player-name" id="name1" style="text-align: right;">GIOCATORE 2</div>
    </div>
  </div>

  <script>
    // Configurazione Firebase (Stessa del controller)
    const firebaseConfig = {
      apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk",
      authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com",
      databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "billiard-scoreboard-3cbb5",
      appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Recupera ID partita dall'URL
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    if (matchId) {
      const matchRef = db.ref('matches/' + matchId);
      matchRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          updateDisplay('name0', data.n0);
          updateDisplay('name1', data.n1);
          updateScore('score0', data.s0);
          updateScore('score1', data.s1);
          updateSets('sets0', data.st0, 'active-p1');
          updateSets('sets1', data.st1, 'active-p2');
        }
      });
    }

    function updateDisplay(id, val) {
      document.getElementById(id).innerText = val || (id.includes('0') ? "GIOCATORE 1" : "GIOCATORE 2");
    }

    function updateScore(id, val) {
      const el = document.getElementById(id);
      if (el.innerText != val) {
        el.innerText = val;
        el.classList.add('score-update');
        setTimeout(() => el.classList.remove('score-update'), 300);
      }
    }

    function updateSets(id, count, activeClass) {
      const container = document.getElementById(id);
      container.innerHTML = '';
      // Mostriamo sempre 3 pallini, colorati in base ai set vinti
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('div');
        dot.className = 'set-dot' + (i < count ? ' ' + activeClass : '');
        container.appendChild(dot);
      }
    }
  </script>
</body>
</html>
