<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billiard Scoreboard - LIVE SCORE PUBBLICO</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #071f14; /* Sfondo scuro tipico dell'app */
      color: white;
      font-family: 'Roboto', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* HEADER */
    .header {
      background: #0b2b1c;
      border-bottom: 4px solid #164d34;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
    }

    .header-logo {
      height: 60px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    /* GRIGLIA LIVESCORE */
    .grid-container {
      flex: 1;
      padding: 30px;
      display: grid;
      /* Si adatta automaticamente: se lo schermo è grande affianca più tavoli, se è piccolo va a capo */
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 30px;
      overflow-y: auto;
      align-content: start;
    }

    /* CARD SINGOLO TAVOLO */
    .table-card {
      background: #0b2b1c;
      border: 3px solid #164d34;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* NOME TAVOLO (Testata della card) */
    .table-header {
      background: #8e5e2d;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 1.4rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 3px solid #000;
    }

    /* CORPO DELLA CARD (Nomi e Punteggi) */
    .table-body {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
    }

    /* SEZIONE GIOCATORE */
    .player-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      width: 40%;
    }

    .player-name {
      font-size: 1.5rem;
      font-weight: 900;
      text-transform: capitalize; /* Prima lettera maiuscola */
      text-align: center;
      margin-bottom: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .player-score {
      font-size: 3.5rem;
      font-weight: 900;
      background: #164d34;
      padding: 5px 20px;
      border-radius: 8px;
      min-width: 90px;
      text-align: center;
      line-height: 1;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    .player-sets {
      font-size: 1.8rem;
      font-weight: 900;
      background: white;
      color: black;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      box-shadow: 0 3px 6px rgba(0,0,0,0.5);
    }

    /* ZONA CENTRALE (VS) */
    .vs-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 15px;
    }

    .vs-text {
      font-size: 1.2rem;
      font-weight: 900;
      font-style: italic;
      color: rgba(255, 255, 255, 0.4);
    }

    /* COLORI GIOCATORE 2 */
    .p2-text { color: #facc15; }
    .p2-score { color: #facc15; }
    .p2-sets { background: #facc15; color: black; }

    /* MESSAGGIO ERRORE/ATTESA */
    #status-msg {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      color: #facc15;
      margin-top: 50px;
      width: 100%;
    }

  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">LIVESCORE IN DIRETTA</div>
    <img src="https://billiardscoreboard.github.io/BilliardScoreboard/Logo_App_Colorato.svg" class="header-logo" alt="Logo">
  </div>

  <div id="livescore-container" class="grid-container">
    <div id="status-msg">In attesa dei dati... (Assicurati di aver inserito ?user=TUO_ID nel link)</div>
  </div>

<script>
  // 1. CONFIGURAZIONE FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk",
    authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com",
    databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "billiard-scoreboard-3cbb5",
    appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // 2. RECUPERO ID UTENTE DAL LINK
  const urlParams = new URLSearchParams(window.location.search);
  const userId = urlParams.get('user');
  const container = document.getElementById('livescore-container');

  let mieiTavoli = {};
  let tuttiITavoliLive = {};

  if (!userId) {
    container.innerHTML = `<div id="status-msg" style="color:#e74c3c;">⚠️ ERRORE: ID utente mancante.<br>Aggiungi ?user=IL_TUO_USER_ID alla fine dell'indirizzo web.</div>`;
  } else {
    // 3. ASCOLTO DEI TAVOLI COLLEGATI ALL'ACCOUNT
    db.ref('users/' + userId + '/miei_tavoli').on('value', (snapMiei) => {
      mieiTavoli = snapMiei.val() || {};
      
      if (Object.keys(mieiTavoli).length === 0) {
        container.innerHTML = '<div id="status-msg">Nessun biliardo collegato a questo account.</div>';
        return;
      }

      // 4. ASCOLTO DEI DATI LIVE DI TUTTI I TAVOLI
      db.ref('matches').off(); 
      db.ref('matches').on('value', (snapMatches) => {
        tuttiITavoliLive = snapMatches.val() || {};
        aggiornaLivescore();
      });
    });
  }

  // 5. FUNZIONE DI COSTRUZIONE DELLA GRIGLIA
  function aggiornaLivescore() {
    // Ordina i tavoli in base all'ordine stabilito nella dashboard
    const tavoliOrdinati = Object.keys(mieiTavoli).sort((a, b) => {
      return (mieiTavoli[a].ordine || 0) - (mieiTavoli[b].ordine || 0);
    });

    container.innerHTML = ''; 

    tavoliOrdinati.forEach(matchId => {
      const liveData = tuttiITavoliLive[matchId] || { n0: 'Giocatore 1', n1: 'Giocatore 2', s0: 0, s1: 0, st0: 0, st1: 0 };
      const nomeEsteticoTavolo = mieiTavoli[matchId].nome || matchId;

      // Applica il toLowerCase() per far funzionare bene il text-transform: capitalize del CSS
      const n0 = (liveData.n0 || 'Giocatore 1').toLowerCase();
      const n1 = (liveData.n1 || 'Giocatore 2').toLowerCase();

      const card = document.createElement('div');
      card.className = 'table-card';
      
      card.innerHTML = `
        <div class="table-header">${nomeEsteticoTavolo}</div>
        <div class="table-body">
          
          <div class="player-col">
            <div class="player-name" title="${n0}">${n0}</div>
            <div class="score-row">
              <div class="player-sets">${liveData.st0 !== undefined ? liveData.st0 : 0}</div>
              <div class="player-score">${liveData.s0 !== undefined ? liveData.s0 : 0}</div>
            </div>
          </div>

          <div class="vs-col">
            <div class="vs-text">VS</div>
          </div>

          <div class="player-col">
            <div class="player-name p2-text" title="${n1}">${n1}</div>
            <div class="score-row">
              <div class="player-score p2-score">${liveData.s1 !== undefined ? liveData.s1 : 0}</div>
              <div class="player-sets p2-sets">${liveData.st1 !== undefined ? liveData.st1 : 0}</div>
            </div>
          </div>

        </div>
      `;
      
      container.appendChild(card);
    });
  }
</script>
</body>
</html>
