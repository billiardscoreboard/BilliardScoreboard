<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direzione Gara - Biliardi</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; overflow-x: hidden; display: flex; height: 100vh; }
        
        #login-screen { position: absolute; top:0; left:0; width:100%; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #eef2f5; z-index: 1000;}
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .btn-login { width: 100%; padding: 12px; background: #1a237e; color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-top: 10px;}

        #dashboard-screen { display: none; width: 100%; height: 100vh; }
        .sidebar { width: 280px; background: #ffffff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.02); z-index: 10; flex-shrink: 0; overflow-y: auto;}
        
        .logo-area { padding: 30px 20px; text-align: center; border-bottom: 1px solid #e0e0e0; }
        .logo-area h2 { font-size: 1.2rem; color: #2c3e50; margin-top: 10px; }
        .user-email { font-size: 0.85rem; color: #7f8c8d; margin-top: 5px; word-break: break-all; font-weight: bold; }
        
        .nav-menu { flex: 1; padding-top: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 15px 25px; color: #34495e; text-decoration: none; font-weight: 600; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; border-left: 4px solid transparent; transition: 0.2s;}
        .nav-item:hover { background: #f8f9fa; }
        .nav-item.active { background: #f0f4f8; color: #1a237e; border-left: 4px solid #1a237e; }
        
        .main-content { flex: 1; padding: 40px; overflow-y: auto; background: #f4f6f9; }
        .tab-section { display: none; }
        .tab-section.active { display: block; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header h1 { color: #1a237e; font-size: 1.8rem; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .table-row { display: flex; align-items: center; background: white; padding: 15px 20px; border-radius: 50px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); gap: 10px; }
        .table-identity { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 140px; flex-shrink: 0; }
        .table-real-id { font-size: 0.65rem; color: #95a5a6; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        .table-name-input { background: #1a237e; color: white; padding: 0 10px; height: 40px; border-radius: 20px; font-weight: bold; font-size: 1rem; width: 100%; text-align: center; border: 2px solid transparent; outline: none; }
        
        .pill { border-radius: 30px; border: 1px solid #ccc; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 1.1rem; }
        .pill-name { flex: 2; padding: 0 15px; }
        .pill-name input { width: 100%; border: none; background: transparent; text-align: center; font-weight: 600; font-size: 1.2rem; color: #e67e22; outline: none; }
        .pill-score { flex: 1; border-color: #e67e22; color: #e67e22; font-size: 1.6rem; }
        .pill-match { flex: 0.7; color: #1a237e; border-color: #1a237e; font-size: 1rem; flex-direction: column; }
        
        .p2-score { background: #f39c12; color: white; border-color: #f39c12; }
        .p2-name { background: #f39c12; color: white; border-color: #f39c12; }
        .p2-name input { color: white; }

        .btn-invert { background: #34495e; color: white; border: none; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; flex-shrink: 0; }
        .action-btns { display: flex; gap: 8px; margin-left: auto; }
        .btn-reset { background: #95a5a6; color: white; border: none; height: 40px; padding: 0 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-remove { background: white; border: 2px solid #e74c3c; color: #e74c3c; width: 40px; height: 40px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        .history-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid #1a237e; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 20px; color: #1a237e;">Direzione Gara</h2>
            <form id="login-form" onsubmit="eseguiLogin(event)">
                <input type="email" id="email" class="login-input" placeholder="Email Utente" required>
                <input type="password" id="pwd" class="login-input" placeholder="Password" required>
                <button type="submit" class="btn-login">ACCEDI</button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen">
        <nav class="sidebar">
            <div class="logo-area">
                <!-- ZERO CODICE GRAFICO. SOLO TESTO E PALLINA -->
                <div style="font-size: 3.5rem; margin-bottom: 5px;">🎱</div>
                <h2>Direzione Gara</h2>
                <div id="user-email-display" class="user-email"></div>
                <div id="status-led" style="width:12px; height:12px; border-radius:50%; background:gray; margin:10px auto; border:2px solid #fff;"></div>
            </div>
            <div class="nav-menu">
                <a class="nav-item active" onclick="cambiaScheda('biliardi')">🕹️ Biliardi</a>
                <a class="nav-item" onclick="cambiaScheda('storico')">🕒 Storico Partite</a>
                <a class="nav-item" style="margin-top: auto; color: #e74c3c;" onclick="eseguiLogout()">🚪 Logout</a>
            </div>
        </nav>

        <main class="main-content">
            <div id="sez-biliardi" class="tab-section active">
                <div class="header">
                    <h1>Gestione Biliardi</h1>
                    <button class="btn-add" onclick="aggiungiTavolo()">➕ AGGIUNGI BILIARDO</button>
                </div>
                <div id="tables-container"></div>
            </div>

            <div id="sez-storico" class="tab-section">
                <div class="header"><h1>Storico Partite</h1></div>
                <div id="history-container"></div>
            </div>
        </main>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk", 
        authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com", 
        databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "billiard-scoreboard-3cbb5", 
        appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(); 
    const auth = firebase.auth();

    let userId = null; 
    let mieiTavoli = {}; 
    let tuttiITavoli = {}; 

    function eseguiLogin(e) {
        e.preventDefault();
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pwd').value);
    }

    function eseguiLogout() { auth.signOut(); location.reload(); }

    auth.onAuthStateChanged(user => {
        if(user) {
            userId = user.uid;
            document.getElementById('status-led').style.background = "#27ae60";
            document.getElementById('user-email-display').innerText = user.email;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'flex';
            
            db.ref('users/' + userId + '/miei_tavoli').on('value', s => { 
                mieiTavoli = s.val() || {}; 
                disegnaTabellone(); 
            });
            db.ref('matches').on('value', s => { 
                tuttiITavoli = s.val() || {}; 
                disegnaTabellone(); 
            });
        }
    });

    function aggiungiTavolo() {
        if (!userId) return;
        if (typeof mieiTavoli !== 'object' || mieiTavoli === null) mieiTavoli = {};
        let id = prompt("Inserisci ID Tablet:", "TAVOLO-");
        if (id && id.trim() !== "" && id !== "TAVOLO-") {
            let cleanID = id.trim();
            db.ref('users/' + userId + '/miei_tavoli/' + cleanID).set({
                nome: cleanID,
                ordine: Object.keys(mieiTavoli).length
            }).then(() => alert("Biliardo " + cleanID + " aggiunto!")).catch(e => alert("Errore: " + e.message));
        }
    }

    function disegnaTabellone() {
        const container = document.getElementById('tables-container');
        const ids = Object.keys(mieiTavoli).sort((a,b) => (mieiTavoli[a].ordine || 0) - (mieiTavoli[b].ordine || 0));
        container.innerHTML = ids.length === 0 ? '<p style="text-align:center; padding:40px;">Nessun biliardo collegato.</p>' : '';
        ids.forEach(mId => {
            const live = tuttiITavoli[mId] || { n0: 'G1', n1: 'G2', s0: 0, s1: 0, st0: 0, st1: 0 };
            const row = document.createElement('div');
            row.className = 'table-row';
            row.innerHTML = `
                <div class="table-identity">
                    <div class="table-real-id">ID: ${mId}</div>
                    <input type="text" class="table-name-input" value="${mieiTavoli[mId].nome || mId}" onchange="salvaNome('${mId}', this.value)">
                </div>
                <div class="pill pill-name"><input type="text" value="${live.n0}" onchange="updateLive('${mId}', 'n0', this.value)"></div>
                <div class="pill pill-match"><div>${live.st0}</div><small>Set</small></div>
                <div class="pill pill-score">${live.s0}</div>
                <button class="btn-invert" onclick="inverti('${mId}')">⇄</button>
                <div class="pill pill-score p2-score">${live.s1}</div>
                <div class="pill pill-match"><div>${live.st1}</div><small>Set</small></div>
                <div class="pill pill-name p2-name"><input type="text" value="${live.n1}" onchange="updateLive('${mId}', 'n1', this.value)"></div>
                <div class="action-btns">
                    <button class="btn-reset" onclick="resetPunti('${mId}')">🔄</button>
                    <button class="btn-remove" onclick="rimuoviTavolo('${mId}')">🗑️</button>
                </div>`;
            container.appendChild(row);
        });
    }

    function updateLive(id, k, v) { db.ref('matches/' + id).update({ [k]: v }); }
    function salvaNome(id, n) { db.ref('users/' + userId + '/miei_tavoli/' + id).update({ nome: n }); }
    function rimuoviTavolo(id) { if(confirm("Scollegare biliardo?")) db.ref('users/' + userId + '/miei_tavoli/' + id).remove(); }
    function resetPunti(id) { if(confirm("Azzerare punteggio?")) db.ref('matches/' + id).update({ s0:0, s1:0, st0:0, st1:0 }); }
    function inverti(id) {
        const d = tuttiITavoli[id];
        db.ref('matches/' + id).update({ n0:d.n1, n1:d.n0, s0:d.s1, s1:d.s0, st0:d.st1, st1:d.st0 });
    }
    function cambiaScheda(s) {
        document.querySelectorAll('.tab-section').forEach(el => el.classList.remove('active'));
        document.getElementById('sez-' + s).classList.add('active');
    }
</script>
</body>
</html>
