<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Billiard Scoreboard - OBS Multi-Table Ticker</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
      
      /* Forza la barra ad ancorarsi in basso (se la vuoi in alto cambia flex-end con flex-start) */
      height: 100vh;
      display: flex;
      align-items: flex-end; 
    }

    /* LA BARRA DI SFONDO TV (Larga tutto lo schermo) */
    .ticker-wrapper {
      width: 100%;
      background: rgba(0, 0, 0, 0.85); /* Sfondo scuro semi-trasparente */
      border-top: 3px solid #164d34; /* Riga verde decorativa */
      border-bottom: 3px solid #164d34;
      overflow: hidden; /* Taglia via i tavoli quando escono dallo schermo */
      box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
    }

    /* IL RULLO CHE SCORRE ALL'INTERNO */
    #ticker-container {
      display: flex;
      flex-wrap: nowrap; /* Fondamentale: impedisce di andare a capo */
      gap: 60px; /* Spazio tra un tavolo e l'altro */
      padding: 12px 0;
      align-items: center;
      width: max-content; /* Si allarga all'infinito in base ai tavoli collegati */
      
      /* LA MAGIA DELL'ANIMAZIONE: scorre in 40 secondi, lineare, all'infinito */
      animation: scorriRullo 25s linear infinite;
    }

    /* MOTORE DELL'ANIMAZIONE */
    @keyframes scorriRullo {
      0%   { transform: translateX(100vw); }  /* Parte fuori dallo schermo a DESTRA */
      100% { transform: translateX(-100%); }  /* Scompare fuori dallo schermo a SINISTRA */
    }

    /* CASSETTA SINGOLO TAVOLO */
    .table-ticker-box {
      display: flex;
      align-items: center;
      background: #071f14;
      border: 2px solid #fff;
      border-radius: 8px;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.8);
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ETICHETTA NOME TAVOLO LATERALE */
    .ticker-table-name {
      background: #8e5e2d;
      color: white;
      padding: 10px 15px;
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
      border-right: 2px solid #000;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      height: 100%;
    }

    /* BLOCCO MATCH */
    .ticker-match-content {
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 12px;
    }

    /* NOMI GIOCATORI */
    .player-name {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .p2-color { color: #facc15; }

    /* PUNTEGGI */
    .score-badge {
      font-size: 22px;
      font-weight: 900;
      background: #164d34;
      color: white;
      padding: 2px 10px;
      border-radius: 4px;
      min-width: 35px;
      text-align: center;
    }
    .p2-score { color: #facc15; }

    /* CASSETTA SET ROTONDA */
    .set-circle {
      font-size: 16px;
      font-weight: 900;
      background: white;
      color: black;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .p2-sets { background: #facc15; }

    /* SEPARATORE VS DI METÀ */
    .vs-separator {
      font-size: 14px;
      font-style: italic;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.4);
      padding: 0 4px;
    }

    /* STATO MESSAGGI DI CONFIGURAZIONE ERRORE */
    #status-msg {
      color: white;
      background: rgba(231, 76, 60, 0.85);
      padding: 15px 25px;
      font-size: 16px;
      border-radius: 8px;
      font-weight: bold;
      border: 2px solid #c0392b;
      margin: 20px;
      display: inline-block;
      animation: none; /* L'errore non deve scorrere */
    }
  </style>
</head>
<body>

  <div class="ticker-wrapper">
    <div id="ticker-container">
      <div id="status-msg">In attesa dei dati dall'account...</div>
    </div>
  </div>

<script>
  // CONFIGURAZIONE FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk",
    authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com",
    databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "billiard-scoreboard-3cbb5",
    appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const urlParams = new URLSearchParams(window.location.search);
  const userId = urlParams.get('user');
  const container = document.getElementById('ticker-container');

  let mieiTavoli = {};
  let tuttiITavoliLive = {};

  if (!userId) {
    container.innerHTML = `
      <div id="status-msg">
        ⚠️ ERRORE: ID utente mancante nell'indirizzo!<br>
        Configura la sorgente browser inserendo alla fine del link: ?user=IL_TUO_USER_ID
      </div>`;
    container.style.animation = 'none'; // Ferma il rullo se c'è errore
  } else {
    db.ref('users/' + userId + '/miei_tavoli').on('value', (snapMiei) => {
      mieiTavoli = snapMiei.val() || {};
      
      if (Object.keys(mieiTavoli).length === 0) {
        container.innerHTML = '<div id="status-msg">Nessun biliardo collegato a questo account nella Direzione Gara.</div>';
        container.style.animation = 'none';
        return;
      }

      db.ref('matches').off(); 
      db.ref('matches').on('value', (snapMatches) => {
        tuttiITavoliLive = snapMatches.val() || {};
        aggiornaRulloGrafico();
      });
    });
  }

  function aggiornaRulloGrafico() {
    const tavoliOrdinati = Object.keys(mieiTavoli).sort((a, b) => {
      return (mieiTavoli[a].ordine || 0) - (mieiTavoli[b].ordine || 0);
    });

    container.innerHTML = ''; 
    container.style.animation = 'scorriRullo 25s linear infinite'; // Assicura che l'animazione riparta

    tavoliOrdinati.forEach(matchId => {
      const liveData = tuttiITavoliLive[matchId] || { n0: 'G1', n1: 'G2', s0: 0, s1: 0, st0: 0, st1: 0 };
      const nomeEsteticoTavolo = mieiTavoli[matchId].nome || matchId;

      const tableBox = document.createElement('div');
      tableBox.className = 'table-ticker-box';
      tableBox.innerHTML = `
        <div class="ticker-table-name">${nomeEsteticoTavolo}</div>
        <div class="ticker-match-content">
          <div class="player-name">${liveData.n0 || 'GIOCATORE 1'}</div>
          <div class="set-circle">${liveData.st0 !== undefined ? liveData.st0 : 0}</div>
          <div class="score-badge">${liveData.s0 !== undefined ? liveData.s0 : 0}</div>
          
          <div class="vs-separator">VS</div>
          
          <div class="score-badge p2-score">${liveData.s1 !== undefined ? liveData.s1 : 0}</div>
          <div class="set-circle p2-sets">${liveData.st1 !== undefined ? liveData.st1 : 0}</div>
          <div class="player-name p2-color">${liveData.n1 || 'GIOCATORE 2'}</div>
        </div>
      `;
      container.appendChild(tableBox);
    });
  }
</script>
</body>
</html>
