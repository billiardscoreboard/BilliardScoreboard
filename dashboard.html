<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direzione Gara - Biliardi</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f6f9; display: flex; height: 100vh; }
        #login-screen { position: absolute; width:100%; height: 100vh; background: #eef2f5; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        .btn-login { width: 100%; padding: 12px; background: #1a237e; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #dashboard-screen { display: none; width: 100%; height: 100vh; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        .logo-area { padding: 30px 20px; text-align: center; border-bottom: 1px solid #e0e0e0; }
        .nav-menu { flex: 1; padding-top: 20px; }
        .nav-item { padding: 15px 25px; color: #34495e; cursor: pointer; display: flex; align-items: center; text-decoration: none; font-weight: 600; }
        .nav-item.active { background: #f0f4f8; color: #1a237e; border-left: 4px solid #1a237e; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .table-row { display: flex; align-items: center; background: white; padding: 15px 20px; border-radius: 50px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .pill { border-radius: 30px; border: 1px solid #ccc; height: 40px; display: flex; align-items: center; justify-content: center; padding: 0 15px; margin: 0 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Direzione Gara</h2>
            <form onsubmit="eseguiLogin(event)">
                <input type="email" id="email" class="login-input" placeholder="Email" required>
                <input type="password" id="pwd" class="login-input" placeholder="Password" required>
                <button type="submit" class="btn-login">ACCEDI</button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen">
        <nav class="sidebar">
            <div class="logo-area">
                <h3>Dashboard</h3>
                <div id="status-led" style="width:10px; height:10px; border-radius:50%; background:gray; margin:10px auto;"></div>
            </div>
            <div class="nav-menu">
                <div class="nav-item active">🕹️ Biliardi</div>
            </div>
        </nav>
        <main class="main-content">
            <div class="header">
                <h1>I tuoi Biliardi</h1>
                <button class="btn-add" onclick="aggiungiTavolo()">➕ AGGIUNGI BILIARDO</button>
            </div>
            <div id="tables-container"></div>
        </main>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk", 
        authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com", 
        databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "billiard-scoreboard-3cbb5", 
        appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let userId = null;
    let mieiTavoli = {};

    function eseguiLogin(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pwd').value;
        auth.signInWithEmailAndPassword(email, pass);
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            userId = user.uid;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'flex';
            document.getElementById('status-led').style.background = 'green';
            
            db.ref('users/' + userId + '/miei_tavoli').on('value', s => {
                mieiTavoli = s.val() || {};
                disegnaTabellone();
            });
        }
    });

    function aggiungiTavolo() {
        const id = prompt("Inserisci ID Tablet (es. TAVOLO-1):", "TAVOLO-");
        if(id && id !== "TAVOLO-") {
            db.ref('users/' + userId + '/miei_tavoli/' + id).set({ nome: id, ordine: 0 })
              .then(() => alert("Aggiunto!"))
              .catch(err => alert("Errore: " + err.message));
        }
    }

    function disegnaTabellone() {
        const container = document.getElementById('tables-container');
        container.innerHTML = '';
        Object.keys(mieiTavoli).forEach(id => {
            const div = document.createElement('div');
            div.className = 'table-row';
            div.innerHTML = `<div class="pill">${mieiTavoli[id].nome}</div><button onclick="rimuovi('${id}')">🗑️</button>`;
            container.appendChild(div);
        });
    }

    function rimuovi(id) {
        if(confirm("Rimuovere?")) db.ref('users/' + userId + '/miei_tavoli/' + id).remove();
    }
</script>
</body>
</html>
