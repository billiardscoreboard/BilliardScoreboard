<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Billiard OBS Overlay</title>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

  <style>
    /* RESET E TRASPARENZA PER OBS */
    * {
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      /* Sfondo trasparente per far vedere la telecamera su OBS */
      background: transparent; 
      overflow: hidden;
      color: white;
    }

    /* CONTENITORE PADRE (Fissa le coordinate generali) */
    .scoreboard-wrapper {
      position: absolute;
      top: 40px; /* Distanza dall'alto. Puoi cambiarlo in "bottom: 40px;" se la vuoi in basso */
      left: 50%;
      transform: translateX(-50%);
      width: 1400px; /* Larghezza ottimizzata per un canvas OBS a 1080p */
      max-width: 96vw;
      height: 70px;
    }

    /* BARRA PRINCIPALE DEL PUNTEGGIO: GRIGLIA ASSOLUTA E RIGIDA */
    .scoreboard-bar {
      position: absolute;
      top: 0; 
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(7, 31, 20, 0.95); /* Verde scuro elegante e semi-trasparente */
      border: 3px solid #ffffff;
      border-radius: 35px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      
      /* LA MAGIA È QUI: Una griglia dove ogni cosa ha i suoi pixel bloccati */
      display: grid;
      /* Colonne: Set1 | Nome1 | Punti1 | SpazioLogo | Punti2 | Nome2 | Set2 */
      grid-template-columns: 80px 1fr 110px 110px 110px 1fr 80px;
      align-items: center;
    }

    /* IL LOGO: TOTALMENTE SCOLLEGATO DAI TESTI */
    .center-logo-container {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 110px;
      height: 110px;
      background: #0b2b1c;
      border: 3px solid #ffffff;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .center-logo-container img {
      width: 70%;
      height: auto;
    }

    /* NOMI GIOCATORI */
    .name-box {
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis; /* Aggiunge i puntini se il nome è troppo lungo */
      padding: 0 20px;
    }
    .p1-name { text-align: right; color: #ffffff; }
    .p2-name { text-align: left; color: #facc15; }

    /* PUNTEGGI */
    .score-box {
      font-size: 52px;
      font-weight: 900;
      text-align: center;
      line-height: 1;
    }
    .p1-score { color: #ffffff; }
    .p2-score { color: #facc15; }

    /* INDICATORI DEI SET */
    .set-box {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }
    .set-circle {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: 900;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .p1-set .set-circle { background: #ffffff; color: #000000; border: 2px solid #ffffff; }
    .p2-set .set-circle { background: #facc15; color: #000000; border: 2px solid #facc15; }

  </style>
</head>
<body>

  <div class="scoreboard-wrapper">
    
    <!-- BARRA A GRIGLIA RIGIDA -->
    <div class="scoreboard-bar">
      
      <!-- GIOCATORE 1 -->
      <div class="set-box p1-set"><div class="set-circle" id="st0">0</div></div>
      <div class="name-box p1-name" id="n0">GIOCATORE 1</div>
      <div class="score-box p1-score" id="s0">0</div>

      <!-- SPAZIO VUOTO CENTRALE (Dedicato al logo) -->
      <div></div>

      <!-- GIOCATORE 2 -->
      <div class="score-box p2-score" id="s1">0</div>
      <div class="name-box p2-name" id="n1">GIOCATORE 2</div>
      <div class="set-box p2-set"><div class="set-circle" id="st1">0</div></div>

    </div>

    <!-- LOGO (Sovrapposto e ancorato al 50% esatto) -->
    <div class="center-logo-container">
      <img src="Logo_App_Trasparente.svg" alt="Logo" />
    </div>

  </div>

  <script>
    // Configurazione Firebase
    const firebaseConfig = { 
      apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk", 
      authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com", 
      databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app", 
      projectId: "billiard-scoreboard-3cbb5", 
      appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Cattura l'ID del tavolo
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    if(matchId) {
      db.ref('matches/' + matchId).on('value', snap => {
        const data = snap.val();
        if(data) {
          // Aggiorna Giocatore 1
          document.getElementById('n0').innerText = data.n0 || "GIOCATORE 1";
          document.getElementById('s0').innerText = data.s0 || 0;
          document.getElementById('st0').innerText = data.st0 || 0;

          // Aggiorna Giocatore 2
          document.getElementById('n1').innerText = data.n1 || "GIOCATORE 2";
          document.getElementById('s1').innerText = data.s1 || 0;
          document.getElementById('st1').innerText = data.st1 || 0;
        }
      });
    } else {
      document.body.innerHTML = "<h2 style='color:red; text-align:center; margin-top:50px; text-shadow: 2px 2px 4px #000;'>ERRORE: ID TAVOLO MANCANTE NELL'URL</h2>";
    }
  </script>

</body>
</html>
