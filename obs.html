<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Billiard ScoreBoard - OBS Professional Overlay</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    /* Reset e Sfondo trasparente per OBS */
    body { 
      margin: 0; 
      padding: 30px; 
      overflow: hidden; 
      background-color: transparent; 
      font-family: 'Montserrat', sans-serif;
    }

    /* Layout Principale */
    .scoreboard-wrapper {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .main-bar {
      display: flex;
      align-items: center;
      background: rgba(10, 43, 28, 0.9); /* Verde molto scuro trasparente */
      backdrop-filter: blur(8px);
      border-bottom: 3px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      height: 60px;
      padding: 0;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    /* Blocchi Giocatori */
    .player-section {
      display: flex;
      align-items: center;
      padding: 0 25px;
      height: 100%;
    }

    .name {
      font-size: 24px;
      font-weight: 800;
      text-transform: uppercase;
      color: #ffffff;
      letter-spacing: 1px;
      min-width: 180px;
      white-space: nowrap;
    }

    /* Punteggi */
    .score-container {
      width: 80px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      font-family: 'Oswald', sans-serif;
      position: relative;
    }

    .score-val {
      font-size: 42px;
      font-weight: 700;
      color: #ffffff;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Colore P2 (Giallo) */
    .p2-name { color: #f1c40f; }
    .p2-score-box { border-left: 2px solid rgba(241, 196, 15, 0.3); }
    .p2-score-val { color: #f1c40f; }

    /* Indicatori Set (Pallini) */
    .set-status {
      display: flex;
      gap: 5px;
      margin-left: 15px;
    }

    .set-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .active-p1 { background: #ffffff !important; box-shadow: 0 0 10px #ffffff; border: none; }
    .active-p2 { background: #f1c40f !important; box-shadow: 0 0 10px #f1c40f; border: none; }

    /* Logo Piccolo Centrale */
    .center-divider {
      background: #ffffff;
      width: 2px;
      height: 30px;
      opacity: 0.3;
    }

    /* Animazione Cambio Punteggio */
    .pulse {
      transform: scale(1.3);
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>

  <div class="scoreboard-wrapper">
    <div class="main-bar">
      
      <div class="player-section">
        <div class="name" id="n0">GIOCATORE 1</div>
        <div class="set-status" id="st0"></div>
      </div>
      
      <div class="score-container">
        <div class="score-val" id="s0">0</div>
      </div>

      <div class="center-divider"></div>

      <div class="score-container p2-score-box">
        <div class="score-val p2-score-val" id="s1">0</div>
      </div>

      <div class="player-section">
        <div class="set-status" id="st1" style="margin-left:0; margin-right:15px;"></div>
        <div class="name p2-name" id="n1">GIOCATORE 2</div>
      </div>

    </div>
  </div>

  <script>
    // Inizializzazione Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk",
      authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com",
      databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "billiard-scoreboard-3cbb5",
      appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Estrazione ID Match dall'URL (?id=TAVOLO-XXXX)
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    if (matchId) {
      db.ref('matches/' + matchId).on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          document.getElementById('n0').innerText = data.n0 || "G1";
          document.getElementById('n1').innerText = data.n1 || "G2";
          
          updateScore('s0', data.s0);
          updateScore('s1', data.s1);
          
          renderSets('st0', data.st0, 'active-p1');
          renderSets('st1', data.st1, 'active-p2');
        }
      });
    }

    function updateScore(id, newVal) {
      const el = document.getElementById(id);
      if (el.innerText != newVal) {
        el.innerText = newVal;
        el.classList.add('pulse');
        setTimeout(() => el.classList.remove('pulse'), 400);
      }
    }

    function renderSets(containerId, count, activeClass) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      // Visualizza fino a 3 set (modificabile se necessario)
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('div');
        dot.className = 'set-dot' + (i < count ? ' ' + activeClass : '');
        container.appendChild(dot);
      }
    }
  </script>
</body>
</html>
