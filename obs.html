<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Billiard ScoreBoard - OBS Numeric Overlay</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    /* Reset e Sfondo trasparente per OBS */
    body { 
      margin: 0; 
      padding: 30px; 
      overflow: hidden; 
      background-color: transparent; 
      font-family: 'Montserrat', sans-serif;
    }

    /* Layout Principale */
    .scoreboard-wrapper {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .main-bar {
      display: flex;
      align-items: center;
      background: rgba(10, 43, 28, 0.9); /* Verde scuro trasparente */
      backdrop-filter: blur(8px);
      border-bottom: 3px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      height: 60px;
      padding: 0;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    /* Blocchi Giocatori */
    .player-section {
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 100%;
    }

    .name {
      font-size: 22px;
      font-weight: 800;
      text-transform: uppercase;
      color: #ffffff;
      letter-spacing: 1px;
      min-width: 160px;
      white-space: nowrap;
    }

    /* Punteggi Principali */
    .score-container {
      width: 80px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      font-family: 'Oswald', sans-serif;
    }

    .score-val {
      font-size: 42px;
      font-weight: 700;
      color: #ffffff;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* SET MODALITÀ NUMERICA */
    .set-box {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 10px;
      font-family: 'Oswald', sans-serif;
    }

    .set-num {
      font-size: 22px;
      font-weight: 700;
    }

    /* Colori G1 */
    .set-num-p1 { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

    /* Colori G2 (Giallo) */
    .p2-name { color: #f1c40f; }
    .p2-score-val { color: #f1c40f; }
    .set-num-p2 { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
    .p2-set-border { border-color: rgba(241, 196, 15, 0.4); }

    .center-divider {
      background: rgba(255, 255, 255, 0.2);
      width: 2px;
      height: 35px;
    }

    /* Animazione Pulse */
    .pulse {
      transform: scale(1.25);
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>

  <div class="scoreboard-wrapper">
    <div class="main-bar">
      
      <div class="player-section">
        <div class="name" id="n0">GIOCATORE 1</div>
        <div class="set-box">
          <div class="set-num set-num-p1" id="st0">0</div>
        </div>
      </div>
      
      <div class="score-container">
        <div class="score-val" id="s0">0</div>
      </div>

      <div class="center-divider"></div>

      <div class="score-container">
        <div class="score-val p2-score-val" id="s1">0</div>
      </div>

      <div class="player-section">
        <div class="set-box p2-set-border">
          <div class="set-num set-num-p2" id="st1">0</div>
        </div>
        <div class="name p2-name" id="n1" style="text-align: right;">GIOCATORE 2</div>
      </div>

    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk",
      authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com",
      databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "billiard-scoreboard-3cbb5",
      appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    if (matchId) {
      db.ref('matches/' + matchId).on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          document.getElementById('n0').innerText = data.n0 || "G1";
          document.getElementById('n1').innerText = data.n1 || "G2";
          
          updateValue('s0', data.s0);
          updateValue('s1', data.s1);
          
          // Aggiornamento Numerico dei Set
          document.getElementById('st0').innerText = data.st0 || 0;
          document.getElementById('st1').innerText = data.st1 || 0;
        }
      });
    }

    function updateValue(id, newVal) {
      const el = document.getElementById(id);
      if (el.innerText != newVal) {
        el.innerText = newVal;
        el.classList.add('pulse');
        setTimeout(() => el.classList.remove('pulse'), 400);
      }
    }
  </script>
</body>
</html>
