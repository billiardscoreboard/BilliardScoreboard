<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Billiard OBS Overlay</title>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

  <style>
    /* RESET E TRASPARENZA PER OBS */
    * {
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background: transparent; 
      overflow: hidden;
      color: white;
    }

    /* BARRA PRINCIPALE DEL PUNTEGGIO */
    .scoreboard-bar {
      position: absolute;
      top: 40px; 
      left: 50%;
      transform: translateX(-50%);
      width: 1400px;
      max-width: 96vw;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(7, 31, 20, 0.95);
      border: 3px solid #ffffff;
      border-radius: 35px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      padding: 0 20px;
    }

    /* CONTENITORI DEI GIOCATORI */
    .player-side {
      display: flex;
      align-items: center;
      flex: 1;
    }
    .p1 { justify-content: flex-end; }
    .p2 { justify-content: flex-start; }

    /* LOGO CENTRALE CLASSICO */
    .center-logo {
      width: 110px;
      height: 110px;
      background: #0b2b1c;
      border: 3px solid #ffffff;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    .center-logo img {
      width: 70%;
      height: auto;
    }

    /* NOMI GIOCATORI */
    .player-name {
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 350px;
    }
    .p1 .player-name { color: #ffffff; text-align: right; }
    .p2 .player-name { color: #facc15; text-align: left; }

    /* PUNTEGGI */
    .player-score {
      font-size: 52px;
      font-weight: 900;
      line-height: 1;
      min-width: 70px;
      text-align: center;
    }
    .p1 .player-score { color: #ffffff; margin-left: 20px; }
    .p2 .player-score { color: #facc15; margin-right: 20px; }

    /* INDICATORI DEI SET */
    .player-set {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: 900;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }
    .p1 .player-set { margin-right: 20px; background: #ffffff; color: #000000; border: 2px solid #ffffff; }
    .p2 .player-set { margin-left: 20px; background: #facc15; color: #000000; border: 2px solid #facc15; }

  </style>
</head>
<body>

  <div class="scoreboard-bar">
    
    <!-- LATO SINISTRO: GIOCATORE 1 -->
    <div class="player-side p1">
      <div class="player-set" id="st0">0</div>
      <div class="player-name" id="n0">GIOCATORE 1</div>
      <div class="player-score" id="s0">0</div>
    </div>

    <!-- LOGO CENTRALE -->
    <div class="center-logo">
      <img src="Logo_App_Trasparente.svg" alt="Logo">
    </div>

    <!-- LATO DESTRO: GIOCATORE 2 -->
    <div class="player-side p2">
      <div class="player-score" id="s1">0</div>
      <div class="player-name" id="n1">GIOCATORE 2</div>
      <div class="player-set" id="st1">0</div>
    </div>

  </div>

  <script>
    // Configurazione Firebase
    const firebaseConfig = { 
      apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk", 
      authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com", 
      databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app", 
      projectId: "billiard-scoreboard-3cbb5", 
      appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Cattura l'ID del tavolo dall'URL
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    if(matchId) {
      db.ref('matches/' + matchId).on('value', snap => {
        const data = snap.val();
        if(data) {
          // Aggiorna Giocatore 1
          document.getElementById('n0').innerText = data.n0 || "GIOCATORE 1";
          document.getElementById('s0').innerText = data.s0 || 0;
          document.getElementById('st0').innerText = data.st0 || 0;

          // Aggiorna Giocatore 2
          document.getElementById('n1').innerText = data.n1 || "GIOCATORE 2";
          document.getElementById('s1').innerText = data.s1 || 0;
          document.getElementById('st1').innerText = data.st1 || 0;
        }
      });
    } else {
      document.body.innerHTML = "<h2 style='color:red; text-align:center; margin-top:50px; text-shadow: 2px 2px 4px #000;'>ERRORE: ID TAVOLO MANCANTE NELL'URL</h2>";
    }
  </script>

</body>
</html>
