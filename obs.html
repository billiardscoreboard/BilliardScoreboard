<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Billiard Scoreboard - OBS Overlay No VS</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 20px;
    }

    /* CONTENITORE PRINCIPALE (Ora trasparente, mantiene solo l'allineamento) */
    .scoreboard-container {
      display: flex;
      align-items: center;
      gap: 40px; 
    }

    /* CONTENITORI GIOCATORI INDIPENDENTI */
    .player-box {
      display: flex;
      align-items: center;
      gap: 15px;
      min-width: 460px; /* Larghezza base della tua grafica */
      white-space: nowrap; /* Impone ai nomi di NON andare a capo, spingendo in fuori la barra */
      
      /* Grafica spostata qui per renderli indipendenti */
      background: #071f14; 
      border: 3px solid #000;
      border-radius: 10px;
      padding: 10px 30px; 
      color: white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    /* G1 spinge i suoi elementi contro il logo. G2 spinge contro il logo */
    #p1-box { justify-content: flex-end; }
    #p2-box { justify-content: flex-start; }

    #p1-box .name { margin-right: auto; }
    #p2-box .name { margin-left: auto; }

    .player-icon {
      height: 50px;
      width: auto;
      flex-shrink: 0; /* Impedisce all'icona di deformarsi */
    }

    .name {
      font-size: 33.6px; 
      text-transform: uppercase;
      min-width: 150px;
    }

    /* PUNTEGGI - VERDE BOSCO */
    .score {
      font-size: 45px;
      color: #fff;
      background: #164d34; 
      padding: 0 15px;
      border-radius: 5px;
      min-width: 60px;
      text-align: center;
      flex-shrink: 0;
    }

    .sets {
      font-size: 38.25px; 
      background: #fff; 
      color: #000;
      width: 44.2px; 
      height: 44.2px; 
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* LOGO CENTRALE INDIPENDENTE */
    .center-logo {
      height: 220px; 
      width: auto;
      flex-shrink: 0;
      margin-bottom: 40px; /*
      /* Ombra aggiunta per coerenza visiva con i box */
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
    }

    /* COLORI SPECIFICI P2 */
    .p2-name { color: #facc15; }
    .p2-score { color: #facc15 !important; }
    .p2-sets { background: #facc15 !important; }

  </style>
</head>
<body>

  <div class="scoreboard-container">
    
    <div class="player-box" id="p1-box">
      <img src="Logo_Giocatore_Bianco.svg" class="player-icon" alt="P1 Icon">
      <div id="name0" class="name">GIOCATORE 1</div>
      <div id="st0" class="sets">0</div>
      <div id="score0" class="score">0</div>
    </div>

    <img src="Logo_App_Colorato.svg" class="center-logo" alt="App Logo">

    <div class="player-box" id="p2-box">
      <div id="score1" class="score p2-score">0</div>
      <div id="st1" class="sets p2-sets">0</div>
      <div id="name1" class="name p2-name" style="text-align: right;">GIOCATORE 2</div>
      <img src="Logo_Giocatore_Giallo.svg" class="player-icon" alt="P2 Icon">
    </div>

  </div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCKJs9TTf7wUipvOMWG-tgfzVlpIj0kmGk",
    authDomain: "billiard-scoreboard-3cbb5.firebaseapp.com",
    databaseURL: "https://billiard-scoreboard-3cbb5-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "billiard-scoreboard-3cbb5",
    appId: "1:50403982389:web:57c2b0dbe03b4b47dec57c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const urlParams = new URLSearchParams(window.location.search);
  const matchId = urlParams.get('id');

  if (matchId) {
    const matchRef = db.ref('matches/' + matchId);
    matchRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        document.getElementById('name0').innerText = data.n0 || "GIOCATORE 1";
        document.getElementById('name1').innerText = data.n1 || "GIOCATORE 2";
        document.getElementById('score0').innerText = data.s0 || 0;
        document.getElementById('score1').innerText = data.s1 || 0;
        document.getElementById('st0').innerText = data.st0 || 0;
        document.getElementById('st1').innerText = data.st1 || 0;

        // --- TRUCCO DELLA BILANCIA SIMMETRICA ---
        // Quando arriva un aggiornamento, calcola quale lato pesa di più e rende l'altro identico.
        setTimeout(() => {
          const p1 = document.getElementById('p1-box');
          const p2 = document.getElementById('p2-box');
          
          // Sblocca la larghezza per misurare il reale ingombro dei testi
          p1.style.width = 'auto';
          p2.style.width = 'auto';
          
          // Misura i pixel occupati da entrambi i lati
          const w1 = p1.scrollWidth;
          const w2 = p2.scrollWidth;
          
          // Trova il più largo dei due (partendo sempre da una base di 460px)
          const maxW = Math.max(w1, w2, 460); 
          
          // Impone la larghezza vincente ad entrambi i lati: barra simmetrica, logo al centro.
          p1.style.width = maxW + 'px';
          p2.style.width = maxW + 'px';
        }, 10);
      }
    });
  } else {
    document.body.innerHTML = "<div style='color:white; background:red; padding:20px;'>ERRORE: ID TAVOLO MANCANTE</div>";
  }
</script>
</body>
</html>
